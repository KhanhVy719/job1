# Template MongoDB config cho VPS database Rophim.
# Kiểm tra path thực tế của distro trước khi thay /etc/mongod.conf.

storage:
  dbPath: /var/lib/mongodb

systemLog:
  destination: file
  logAppend: true
  path: /var/log/mongodb/mongod.log

net:
  port: 27017
  # Giai đoạn 1 VPS: chỉ localhost.
  # Khi có app VPS riêng, thêm private/VPN IP của database VPS, ví dụ: 127.0.0.1,10.8.0.2
  bindIp: 127.0.0.1

processManagement:
  timeZoneInfo: /usr/share/zoneinfo

security:
  authorization: enabled

# Bật khi cần debug slow query qua profiler/diagnostic tooling.
# operationProfiling:
#   slowOpThresholdMs: 100
#   mode: slowOp
