# RoPhim platform — 5 app services + internal MongoDB & Redis
# NOTE: mongo/redis are NOT published to the host (no `ports:`); they are only
# reachable on the internal `rophim` network. Each app reads its own secrets
# from its existing .env via `env_file`. Override host names there to point at
# the compose service names (mongo / redis) when running in this stack.

services:
  caddy:
    image: caddy:2-alpine
    # Reverse proxy + auto HTTPS (Let's Encrypt) cho các domain công khai.
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - client
      - admin
      - webapi
      - cdn
      - server
    networks: [rophim]
    restart: unless-stopped

  client:
    build: ./client
    image: rophim-client
    env_file: ./client/.env
    environment:
      PORT: "3000"
      NODE_ENV: production
      NEXT_SERVER_API_URL: "http://webapi:8001"
    ports:
      - "3000:3000"
    depends_on:
      - webapi
      - cdn
    networks: [rophim]
    restart: unless-stopped

  admin:
    build: ./admin
    image: rophim-admin
    env_file: ./admin/.env
    environment:
      PORT: "3001"
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      - server
    networks: [rophim]
    restart: unless-stopped

  webapi:
    build: ./webapi
    image: rophim-webapi
    env_file: ./webapi/.env
    environment:
      URL: "0.0.0.0"
      PORT: "8001"
      NODE_ENV: production
      VIDSRC_MOVIE_URL_TEMPLATE: "https://vsembed.ru/embed/movie/{tmdbId}"
      VIDSRC_TV_URL_TEMPLATE: "https://vsembed.ru/embed/tv/{tmdbId}/{season}-{episode}"
      HLS_PROXY_ENABLED: "true"
    depends_on:
      - ollama
    ports:
      - "8001:8001"
    volumes:
      - webapi_public:/app/public
      - webapi_tmp:/app/tmp
    networks: [rophim]
    restart: unless-stopped

  server:
    build: ./server
    image: rophim-server
    env_file: ./server/.env
    environment:
      URL: "0.0.0.0"
      PORT: "8001"
      NODE_ENV: production
      VIDSRC_MOVIE_URL_TEMPLATE: "https://vsembed.ru/embed/movie/{tmdbId}"
      VIDSRC_TV_URL_TEMPLATE: "https://vsembed.ru/embed/tv/{tmdbId}/{season}-{episode}"
    ports:
      - "8002:8001"
    volumes:
      - server_upload:/app/upload
      - server_public_upload:/app/public/upload
      - server_tmp:/app/tmp
    networks: [rophim]
    restart: unless-stopped

  cdn:
    build: ./cdn
    image: rophim-cdn
    env_file: ./cdn/.env
    environment:
      URL: "0.0.0.0"
      PORT: "8001"
      NODE_ENV: production
    ports:
      - "5000:8001"
    volumes:
      - cdn_tmp:/app/tmp
    networks: [rophim]
    restart: unless-stopped


  ollama:
    image: ollama/ollama:latest
    # Local LLM cho AI Creative Worker (sinh tieu de section). Khong publish ra host.
    volumes:
      - ollama_data:/root/.ollama
    networks: [rophim]
    restart: unless-stopped

networks:
  rophim:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  webapi_public:
  webapi_tmp:
  server_upload:
  server_public_upload:
  server_tmp:
  cdn_tmp:
  ollama_data:
